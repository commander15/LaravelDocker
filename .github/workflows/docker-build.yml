name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Triggers the build whenever you push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Download your code onto the GitHub cloud server
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Log into your public Docker Hub account
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Step 3: Set up the Docker build environment
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 4: Build the image in the cloud and push it
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel:php-8.3

