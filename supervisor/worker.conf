[program:laravel-worker-high]
process_name=%(program_name)s_%(process_num)02d
command=nice -n -5 php /var/www/html/artisan queue:work --queue=high --sleep=3 --tries=3 --max-time=3600
numprocs=3
autostart=true
autorestart=true
user=forge
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker-high.log
priority=10

[program:laravel-worker-default]
process_name=%(program_name)s_%(process_num)02d
command=nice -n 0 php /var/www/html/artisan queue:work --queue=default --sleep=3 --tries=3 --max-time=3600
numprocs=2
autostart=true
autorestart=true
user=forge
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker-default.log
priority=20

[program:laravel-worker-low]
process_name=%(program_name)s_%(process_num)02d
command=nice -n 10 php /var/www/html/artisan queue:work --queue=low --sleep=3 --tries=3 --max-time=3600
numprocs=1
autostart=true
autorestart=true
user=forge
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker-low.log
priority=30

